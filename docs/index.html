<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>StarSolver</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #07070f;
      color: #d8d8f0;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    #status {
      padding: 8px 12px;
      font-size: 13px;
      line-height: 1.4;
      background: #0e0e1c;
      border-bottom: 1px solid #1e1e38;
      min-height: 44px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #image-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #040408;
      position: relative;
    }

    #preview {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    #placeholder {
      color: #333355;
      font-size: 15px;
      text-align: center;
      padding: 24px;
    }

    #progress-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: #4466ff;
      width: 0%;
      transition: width 0.3s ease;
      display: none;
    }

    /* ── settings panel ────────────────────────────────────────────────────── */

    #settings-panel {
      display: none;
      background: #0e0e1c;
      border-bottom: 1px solid #1e1e38;
      padding: 8px 12px;
      overflow-y: auto;
      max-height: 45vh;
    }

    #settings-panel.open { display: block; }

    .cfg-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 12px;
      color: #9090b8;
    }

    .cfg-row label { flex: 1; }

    .cfg-row input[type=range] {
      flex: 2;
      accent-color: #4466ff;
    }

    .cfg-row input[type=checkbox] {
      width: 18px; height: 18px;
      accent-color: #4466ff;
      cursor: pointer;
    }

    .cfg-row select {
      flex: 2;
      background: #1a1a30;
      color: #9090b8;
      border: 1px solid #2a2a50;
      border-radius: 4px;
      padding: 3px 4px;
      font-size: 12px;
    }

    .cfg-row input[type=color] {
      width: 32px;
      height: 24px;
      border: none;
      border-radius: 4px;
      padding: 2px;
      cursor: pointer;
      background: #1a1a30;
    }

    .cfg-val {
      width: 20px;
      text-align: right;
      color: #6060a0;
    }

    .cfg-section {
      border-top: 1px solid #1a1a30;
      margin-top: 4px;
      padding-top: 4px;
    }

    #btnResetSettings {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      background: #2a1a1a;
      color: #c06060;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #btnResetSettings:active { background: #3a2020; }

    /* ── buttons ───────────────────────────────────────────────────────────── */

    #buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 8px;
      background: #0e0e1c;
      border-top: 1px solid #1e1e38;
    }

    button {
      padding: 13px 4px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #1a1a30;
      color: #9090b8;
      touch-action: manipulation;
      transition: background 0.1s, color 0.1s, opacity 0.1s;
    }

    button:not(:disabled):active { background: #2a2a50; color: #c0c8ff; }
    button:disabled { opacity: 0.3; cursor: default; }

    button.active:not(:disabled) {
      background: #1e2d5a;
      color: #a0c0ff;
    }

    /* 6-column grid so bottom two buttons share the last row equally */
    #buttons { grid-template-columns: repeat(6, 1fr); }
    #btnCamera, #btnGallery, #btnDetect,
    #btnSolve,  #btnRefine,  #btnSave   { grid-column: span 2; }
    #btnSettings, #btnAchievements      { grid-column: span 3; }

    /* ── panorama viewer ───────────────────────────────────────────────────── */

    #pano-viewer {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
    }

    #pano-canvas { width: 100%; height: 100%; display: block; }

    #btnClosePano {
      position: absolute;
      top: 12px; right: 12px;
      width: 40px; height: 40px;
      border: none; border-radius: 50%;
      background: rgba(0,0,0,0.5);
      color: #fff; font-size: 18px;
      cursor: pointer; touch-action: manipulation;
    }

    /* ── achievements panel ────────────────────────────────────────────────── */

    #achievements-panel {
      display: none;
      background: #0e0e1c;
      border-bottom: 1px solid #1e1e38;
      padding: 12px;
      overflow-y: auto;
      max-height: 55vh;
    }
    #achievements-panel.open { display: block; }

    .ach-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a30;
    }
    .ach-label { font-size: 13px; color: #9090b8; }
    .ach-big   { font-size: 22px; font-weight: 700; color: #d8d8f0; }
    .ach-dim   { font-size: 14px; color: #6060a0; font-weight: 400; }

    #achConsList {
      display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 0 6px;
    }

    .ach-img-list { margin: 4px 0 8px; }

    .ach-img-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; border-bottom: 1px solid #12121e;
    }
    .ach-img-info { flex: 1; min-width: 0; }
    .ach-img-name {
      display: block; font-size: 12px; color: #c0c0e0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ach-img-coords { display: block; font-size: 10px; color: #505070; }

    .ach-img-btn {
      flex-shrink: 0; padding: 4px 10px;
      font-size: 11px; font-weight: 600;
      background: #1a1a30; color: #7080c0;
      border: none; border-radius: 5px; cursor: pointer;
    }
    .ach-img-btn:active { background: #2a2a50; }

    .ach-pano-btn {
      width: 100%; margin-top: 6px; padding: 9px;
      font-size: 13px; font-weight: 600;
      background: #0f1f2f; color: #4090c0;
      border: none; border-radius: 6px; cursor: pointer;
    }
    .ach-pano-btn:active  { background: #1a3040; }
    .ach-pano-btn:disabled { opacity: 0.3; cursor: default; }

    #btnResetAch {
      margin-top: 8px; width: 100%; padding: 8px;
      font-size: 12px; font-weight: 600;
      background: #2a1a1a; color: #c06060;
      border: none; border-radius: 6px; cursor: pointer;
    }
    #btnResetAch:active { background: #3a2020; }
    .cons-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: #14141f; color: #383860;
    }
    .cons-tag.seen { background: #0f1f0f; color: #50a050; }
  </style>
</head>
<body>

<div id="status">Loading Python environment…</div>

<div id="image-area">
  <img id="preview" alt="star field">
  <span id="placeholder">Pick or take an image to begin</span>
  <div id="progress-bar"></div>
</div>

<div id="achievements-panel">
  <div class="ach-row">
    <span class="ach-label">Images solved</span>
    <span class="ach-big" id="achImages">0</span>
  </div>
  <div class="ach-row" style="border-bottom:none">
    <span class="ach-label">Constellations observed</span>
    <span class="ach-big"><span id="achConsCount">0</span><span class="ach-dim">/88</span></span>
  </div>
  <div id="achConsList"></div>
  <div class="ach-row" style="border-top:1px solid #1a1a30; border-bottom:none; margin-top:4px">
    <span class="ach-label">Faintest object</span>
    <span class="ach-big" id="achFaintest">—</span>
  </div>
  <div class="ach-row" style="border-top:1px solid #1a1a30; border-bottom:none; margin-top:8px">
    <span class="ach-label">Processed images</span>
    <span class="ach-dim" id="achImageCount">0</span>
  </div>
  <div id="achImageList" class="ach-img-list"></div>
  <button id="btnViewPano"   class="ach-pano-btn" disabled>View panorama</button>
  <button id="btnExportPano" class="ach-pano-btn" disabled>Export panorama</button>
  <button id="btnResetPano"  class="ach-pano-btn" style="color:#c06060">Reset panorama</button>
  <button id="btnResetAch">Reset all data</button>
</div>

<div id="settings-panel">
  <div class="cfg-row">
    <label>Star radius</label>
    <input type="range" id="cfgStarRadius" min="10" max="50" value="25">
    <span class="cfg-val" id="cfgStarRadiusVal">25</span>
  </div>
  <div class="cfg-section">
    <div class="cfg-row">
      <label>Constellation color</label>
      <input type="color" id="cfgConstellationColor" value="#ffb400">
    </div>
    <div class="cfg-row">
      <label>Constellation width</label>
      <input type="range" id="cfgConstellationThickness" min="1" max="10" value="4">
      <span class="cfg-val" id="cfgConstellationThicknessVal">4</span>
    </div>
  </div>
  <div class="cfg-section">
    <div class="cfg-row">
      <label>Match color</label>
      <input type="color" id="cfgMatchColor" value="#ffb400">
    </div>
    <div class="cfg-row">
      <label>Unknown color</label>
      <input type="color" id="cfgUnknownColor" value="#c83232">
    </div>
    <div class="cfg-row">
      <label>Circle width</label>
      <input type="range" id="cfgCircleThickness" min="1" max="8" value="2">
      <span class="cfg-val" id="cfgCircleThicknessVal">2</span>
    </div>
  </div>
  <div class="cfg-section">
    <div class="cfg-row">
      <label>Detection color</label>
      <input type="color" id="cfgDetectionColor" value="#00ff00">
    </div>
    <div class="cfg-row">
      <label>Detection width</label>
      <input type="range" id="cfgDetectionThickness" min="1" max="10" value="5">
      <span class="cfg-val" id="cfgDetectionThicknessVal">5</span>
    </div>
  </div>
  <div class="cfg-section">
    <div class="cfg-row">
      <label>Panorama grid</label>
      <input type="checkbox" id="cfgPanoGrid" checked>
    </div>
    <div class="cfg-row">
      <label>Constellations</label>
      <select id="cfgPanoCons">
        <option value="off">Off</option>
        <option value="all">All</option>
        <option value="observed">Observed only</option>
      </select>
    </div>
  </div>
  <button id="btnResetSettings">Reset to defaults</button>
</div>

<div id="buttons">
  <button id="btnCamera"   disabled>Camera</button>
  <button id="btnGallery"  disabled>Gallery</button>
  <button id="btnDetect"   disabled>Detect</button>
  <button id="btnSolve"    disabled>Solve</button>
  <button id="btnRefine"   disabled>Refine</button>
  <button id="btnSave"     disabled>Save</button>
  <button id="btnSettings"      disabled>Settings</button>
  <button id="btnAchievements" disabled>Achievements</button>
</div>

<input id="inputCamera"  type="file" accept="image/*" capture="environment" style="display:none">
<input id="inputGallery" type="file" accept="image/*"                       style="display:none">

<div id="pano-viewer">
  <canvas id="pano-canvas"></canvas>
  <button id="btnClosePano">✕</button>
</div>

<script>
// ── state ─────────────────────────────────────────────────────────────────────
let pyodide         = null;
let pipeline        = null;
let pano            = null;
let busy            = false;
let imagePath        = '/tmp/input.jpg';
let outputPath       = '/tmp/output.jpg';
let currentBlobURL   = null;
let currentImageFile  = null;
let currentImageBytes = null;
const imageStore      = new Map();  // filename → { bytes, ra, dec, fov }
let solvedOk        = false;
let solveUnlimited  = false;
let detectThreshold = 20.0;

// ── DOM ───────────────────────────────────────────────────────────────────────
const elStatus   = document.getElementById('status');
const elPreview  = document.getElementById('preview');
const elHolder   = document.getElementById('placeholder');
const elProgress = document.getElementById('progress-bar');
const btnCamera   = document.getElementById('btnCamera');
const btnGallery  = document.getElementById('btnGallery');
const btnDetect   = document.getElementById('btnDetect');
const btnSolve    = document.getElementById('btnSolve');
const btnRefine   = document.getElementById('btnRefine');
const btnSave     = document.getElementById('btnSave');
const btnSettings = document.getElementById('btnSettings');

// ── helpers ───────────────────────────────────────────────────────────────────
function setStatus(msg) { elStatus.textContent = msg; }

function setProgress(pct) {
  if (pct === null) { elProgress.style.display = 'none'; return; }
  elProgress.style.display = 'block';
  elProgress.style.width   = pct + '%';
}

function setButtons({ camera=false, gallery=false, detect=false,
                      solve=false, refine=false, save=false,
                      settings=false, achievements=false } = {}) {
  btnCamera.disabled        = !camera;
  btnGallery.disabled       = !gallery;
  btnDetect.disabled        = !detect;
  btnSolve.disabled         = !solve;
  btnRefine.disabled        = !refine;
  btnSave.disabled          = !save;
  btnSettings.disabled      = !settings;
  btnAchievements.disabled  = !achievements;
  [btnDetect, btnSolve, btnRefine].forEach(b => b.classList.remove('active'));
}

function setBusy(on) {
  busy = on;
  if (on) setButtons({});
}

function showImage(data) {
  if (currentBlobURL) URL.revokeObjectURL(currentBlobURL);
  currentBlobURL = URL.createObjectURL(new Blob([data], { type: 'image/jpeg' }));
  elPreview.src           = currentBlobURL;
  elPreview.style.display = 'block';
  elHolder.style.display  = 'none';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fetchText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Fetch failed (${r.status}): ${url}`);
  return r.text();
}

async function fetchBinary(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Fetch failed (${r.status}): ${url}`);
  return new Uint8Array(await r.arrayBuffer());
}

// ── achievements ──────────────────────────────────────────────────────────────

const CONS_ALL = [
  'Andromeda','Antlia','Apus','Aquarius','Aquila','Ara','Aries','Auriga',
  'Boötes','Caelum','Camelopardalis','Cancer','Canes Venatici','Canis Major',
  'Canis Minor','Capricornus','Carina','Cassiopeia','Centaurus','Cepheus',
  'Cetus','Chamaeleon','Circinus','Columba','Coma Berenices','Corona Australis',
  'Corona Borealis','Corvus','Crater','Crux','Cygnus','Delphinus','Dorado',
  'Draco','Equuleus','Eridanus','Fornax','Gemini','Grus','Hercules',
  'Horologium','Hydra','Hydrus','Indus','Lacerta','Leo','Leo Minor','Lepus',
  'Libra','Lupus','Lynx','Lyra','Mensa','Microscopium','Monoceros','Musca',
  'Norma','Octans','Ophiuchus','Orion','Pavo','Pegasus','Perseus','Phoenix',
  'Pictor','Pisces','Piscis Austrinus','Puppis','Pyxis','Reticulum','Sagitta',
  'Sagittarius','Scorpius','Sculptor','Scutum','Serpens','Sextans','Taurus',
  'Telescopium','Triangulum','Triangulum Australe','Tucana','Ursa Major',
  'Ursa Minor','Vela','Virgo','Volans','Vulpecula',
];

const ACH_KEY = 'starsolver_ach';

function loadAch() {
  try { return { images: 0, imageFiles: [], constellations: [], faintest: null,
                 ...JSON.parse(localStorage.getItem(ACH_KEY) || '{}') }; }
  catch { return { images: 0, imageFiles: [], constellations: [], faintest: null }; }
}
function saveAch(a) { localStorage.setItem(ACH_KEY, JSON.stringify(a)); }

function updateAchievements({ constellations, faintest, imageFile } = {}) {
  const a = loadAch();
  if (!a.imageFiles) a.imageFiles = [];

  if (imageFile && !a.imageFiles.includes(imageFile)) {
    a.imageFiles.push(imageFile);
    a.images += 1;
  }
  if (constellations && constellations.length) {
    const seen = new Set(a.constellations);
    constellations.forEach(c => seen.add(c));
    a.constellations = [...seen];
  }
  if (faintest != null && (a.faintest === null || faintest > a.faintest)) {
    a.faintest = faintest;
  }
  saveAch(a);
}

function renderAchievements() {
  const a = loadAch();
  const seen = new Set(a.constellations);

  document.getElementById('achImages').textContent    = a.images;
  document.getElementById('achConsCount').textContent = seen.size;
  document.getElementById('achFaintest').textContent  =
    a.faintest != null ? a.faintest.toFixed(1) + 'm' : '—';

  const list = document.getElementById('achConsList');
  if (!list.children.length) {
    CONS_ALL.forEach(name => {
      const span = document.createElement('span');
      span.className = 'cons-tag';
      span.dataset.cons = name;
      span.textContent  = name;
      list.appendChild(span);
    });
  }
  list.querySelectorAll('.cons-tag').forEach(el => {
    el.classList.toggle('seen', seen.has(el.dataset.cons));
  });

  // Processed images (session)
  const imgList = document.getElementById('achImageList');
  imgList.innerHTML = '';
  document.getElementById('achImageCount').textContent = imageStore.size;
  if (imageStore.size === 0) {
    imgList.innerHTML = '<div style="font-size:11px;color:#404060;padding:4px 0">No images solved this session</div>';
  } else {
    imageStore.forEach((rec, name) => {
      const row  = document.createElement('div');
      row.className = 'ach-img-row';
      row.innerHTML = `
        <div class="ach-img-info">
          <span class="ach-img-name">${name}</span>
          <span class="ach-img-coords">RA ${rec.ra.toFixed(1)}°  Dec ${rec.dec.toFixed(1)}°  FOV ${rec.fov.toFixed(1)}°</span>
        </div>
        <button class="ach-img-btn" data-key="${name}">+ Pano</button>`;
      imgList.appendChild(row);
    });
  }
}

const btnAchievements = document.getElementById('btnAchievements');
btnAchievements.addEventListener('click', () => {
  const panel    = document.getElementById('achievements-panel');
  const settings = document.getElementById('settings-panel');
  settings.classList.remove('open');
  btnSettings.classList.remove('active');
  const isOpen = panel.classList.toggle('open');
  btnAchievements.classList.toggle('active', isOpen);
  if (isOpen) renderAchievements();
});

document.getElementById('btnResetAch').addEventListener('click', () => {
  if (!confirm('Reset all achievements? This cannot be undone.')) return;
  localStorage.removeItem(ACH_KEY);
  imageStore.clear();
  renderAchievements();
});

document.getElementById('btnResetPano').addEventListener('click', () => {
  if (!confirm('Clear the panorama? All added images will be removed.')) return;
  pyodide.runPython('pano = Panorama()');
  pano = pyodide.globals.get('pano');
  btnViewPano.disabled   = true;
  btnExportPano.disabled = true;
  setStatus('Panorama reset.');
});

// ── settings ──────────────────────────────────────────────────────────────────
const SETTINGS_KEY = 'starsolver_draw';

const DEFAULTS = {
  starRadius:             25,
  constellationColor:     '#ffb400',
  constellationThickness: 4,
  matchColor:             '#ffb400',
  unknownColor:           '#c83232',
  circleThickness:        2,
  detectionColor:         '#00ff00',
  detectionThickness:     5,
};

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function hexAsTuple(hex) {
  const [r, g, b] = hexToRgb(hex);
  return pyodide.runPython(`(${r}, ${g}, ${b})`);
}

function loadSettings() {
  try { return { ...DEFAULTS, ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}') }; }
  catch { return { ...DEFAULTS }; }
}

function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

function applySettings(s) {
  const d = pipeline.config.draw;

  document.getElementById('cfgStarRadius').value              = s.starRadius;
  document.getElementById('cfgStarRadiusVal').textContent     = s.starRadius;
  d.star_radius = s.starRadius;

  document.getElementById('cfgConstellationColor').value                  = s.constellationColor;
  document.getElementById('cfgConstellationThickness').value              = s.constellationThickness;
  document.getElementById('cfgConstellationThicknessVal').textContent     = s.constellationThickness;
  d.constellation_color     = hexAsTuple(s.constellationColor);
  d.constellation_thickness = s.constellationThickness;

  document.getElementById('cfgMatchColor').value              = s.matchColor;
  document.getElementById('cfgUnknownColor').value            = s.unknownColor;
  document.getElementById('cfgCircleThickness').value         = s.circleThickness;
  document.getElementById('cfgCircleThicknessVal').textContent = s.circleThickness;
  d.match_color      = hexAsTuple(s.matchColor);
  d.unknown_color    = hexAsTuple(s.unknownColor);
  d.circle_thickness = s.circleThickness;

  document.getElementById('cfgDetectionColor').value              = s.detectionColor;
  document.getElementById('cfgDetectionThickness').value          = s.detectionThickness;
  document.getElementById('cfgDetectionThicknessVal').textContent = s.detectionThickness;
  d.detection_color     = hexAsTuple(s.detectionColor);
  d.detection_thickness = s.detectionThickness;
}

function initSettings() {
  applySettings(loadSettings());

  function wireSlider(id, valId, key, apply) {
    const el = document.getElementById(id);
    const vl = document.getElementById(valId);
    el.addEventListener('input', () => {
      const v = parseInt(el.value);
      vl.textContent = v;
      apply(v);
      const s = loadSettings(); s[key] = v; saveSettings(s);
    });
  }

  function wireColor(id, key, apply) {
    document.getElementById(id).addEventListener('input', e => {
      apply(hexAsTuple(e.target.value));
      const s = loadSettings(); s[key] = e.target.value; saveSettings(s);
    });
  }

  wireSlider('cfgStarRadius',             'cfgStarRadiusVal',             'starRadius',             v => pipeline.config.draw.star_radius             = v);
  wireSlider('cfgConstellationThickness', 'cfgConstellationThicknessVal', 'constellationThickness', v => pipeline.config.draw.constellation_thickness = v);
  wireSlider('cfgCircleThickness',        'cfgCircleThicknessVal',        'circleThickness',        v => pipeline.config.draw.circle_thickness        = v);
  wireSlider('cfgDetectionThickness',     'cfgDetectionThicknessVal',     'detectionThickness',     v => pipeline.config.draw.detection_thickness     = v);

  wireColor('cfgConstellationColor', 'constellationColor', v => pipeline.config.draw.constellation_color = v);
  wireColor('cfgMatchColor',         'matchColor',         v => pipeline.config.draw.match_color         = v);
  wireColor('cfgUnknownColor',       'unknownColor',       v => pipeline.config.draw.unknown_color       = v);
  wireColor('cfgDetectionColor',     'detectionColor',     v => pipeline.config.draw.detection_color     = v);

  document.getElementById('btnResetSettings').addEventListener('click', () => {
    localStorage.removeItem(SETTINGS_KEY);
    localStorage.removeItem(PANO_KEY);
    applySettings({ ...DEFAULTS });
    document.getElementById('cfgPanoGrid').checked = PANO_DEFAULTS.showGrid;
    document.getElementById('cfgPanoCons').value   = PANO_DEFAULTS.constellations;
  });

  // Panorama config (takes effect on next View panorama)
  const ps = loadPanoSettings();
  document.getElementById('cfgPanoGrid').checked = ps.showGrid;
  document.getElementById('cfgPanoCons').value   = ps.constellations;

  document.getElementById('cfgPanoGrid').addEventListener('change', e => {
    savePanoSettings({ ...loadPanoSettings(), showGrid: e.target.checked });
  });
  document.getElementById('cfgPanoCons').addEventListener('change', e => {
    savePanoSettings({ ...loadPanoSettings(), constellations: e.target.value });
  });
}

// ── Pyodide initialisation ────────────────────────────────────────────────────
// When served from localhost, load Python source from the local repo instead
// of CDN so that edits are reflected immediately without committing.
const _LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const CDN_SS  = _LOCAL
  ? '../starsolver'
  : 'https://cdn.jsdelivr.net/gh/vadim-v-lebedev/starsolver@main/starsolver';
const CDN_T3  = 'https://cdn.jsdelivr.net/gh/vadim-v-lebedev/tetra3@master/tetra3';

const SS_FILES = ['pipeline.py','detector.py','solver.py','refine.py',
                  'plate.py','draw.py','catalog.py','minicv.py','config.py',
                  'panorama.py'];
const T3_FILES = ['__init__.py','tetra3.py'];

async function initPyodide() {
  try {
    setProgress(5);
    setStatus('Loading Pyodide…');
    pyodide = await loadPyodide();

    setProgress(20);
    setStatus('Loading numpy · Pillow…');
    await pyodide.loadPackage(['numpy', 'Pillow']);

    setProgress(40);
    setStatus('Fetching starsolver source…');
    pyodide.FS.mkdir('/ss');
    for (const f of SS_FILES) {
      pyodide.FS.writeFile(`/ss/${f}`, await fetchText(`${CDN_SS}/${f}`));
    }
    pyodide.FS.writeFile('/ss/DejaVuSans.ttf',
                         await fetchBinary(`${CDN_SS}/DejaVuSans.ttf`));

    setStatus('Fetching tetra3…');
    pyodide.FS.mkdir('/ss/tetra3');
    for (const f of T3_FILES) {
      pyodide.FS.writeFile(`/ss/tetra3/${f}`, await fetchText(`${CDN_T3}/${f}`));
    }

    setProgress(55);
    setStatus('Fetching star catalog (1.2 MB)…');
    pyodide.FS.writeFile('/ss/hip.npz', await fetchBinary(`${CDN_SS}/hip.npz`));

    setProgress(70);
    setStatus('Fetching pattern database (7.7 MB)…');
    pyodide.FS.writeFile('/ss/tetra3_database.npz',
                         await fetchBinary(`${CDN_SS}/tetra3_database.npz`));

    setProgress(90);
    setStatus('Initialising pipeline…');
    await pyodide.runPythonAsync(`
import sys
sys.path.insert(0, '/ss')
from pipeline import Pipeline
from panorama import Panorama
pipeline = Pipeline()
pano     = Panorama()
`);
    pipeline = pyodide.globals.get('pipeline');
    pano     = pyodide.globals.get('pano');
    initSettings();

    setProgress(100);
    await sleep(300);
    setProgress(null);
    setStatus('Ready — pick or take an image.');
    setButtons({ camera: true, gallery: true, settings: true, achievements: true });

  } catch (e) {
    setProgress(null);
    setStatus('Init failed: ' + (e.message || e));
    console.error(e);
  }
}

// ── image loading ─────────────────────────────────────────────────────────────
async function onImageFile(file) {
  const buf = await file.arrayBuffer();
  currentImageBytes = new Uint8Array(buf);
  pyodide.FS.writeFile(imagePath, currentImageBytes);
  showImage(currentImageBytes);
  currentImageFile = file.name;
  solvedOk        = false;
  solveUnlimited  = false;
  detectThreshold = 20.0;
  btnDetect.textContent = 'Detect';
  btnSolve.textContent  = 'Solve';
  setButtons({ camera: true, gallery: true, detect: true, settings: true, achievements: true });
  setStatus('Image loaded. Tap Detect.');
}

  e.target.value = '';
});
document.getElementById('inputGallery').addEventListener('change', e => {

// ── detect ────────────────────────────────────────────────────────────────────
btnDetect.addEventListener('click', async () => {
  if (busy || !pipeline) return;
  setBusy(true);
  const thr = detectThreshold;
  setStatus(`Detecting stars (threshold=${thr})…`);
  await sleep(30);

  try {
    const r   = pipeline.detect(imagePath, outputPath, thr);
    const n   = r.get('count');
    const msg = r.get('message').toString();
    r.destroy();

    showImage(pyodide.FS.readFile(outputPath));
    detectThreshold = thr / 2;
    btnDetect.textContent = 'Detect more';
    solvedOk       = false;
    solveUnlimited = false;
    btnSolve.textContent = 'Solve';

    const hint = n < 4
      ? `\nToo few stars — tap Detect more (threshold=${detectThreshold.toFixed(0)})`
      : '';
    setStatus(`${msg} · threshold=${thr}${hint}`);
    setButtons({ camera: true, gallery: true, detect: true, solve: n >= 4, settings: true, achievements: true });

  } catch (e) {
    setStatus('Detect error: ' + e.message);
    setButtons({ camera: true, gallery: true, detect: true, settings: true, achievements: true });
    console.error(e);
  }
  busy = false;
});

// ── solve ─────────────────────────────────────────────────────────────────────
btnSolve.addEventListener('click', async () => {
  if (busy || !pipeline) return;
  setBusy(true);
  setStatus(solveUnlimited ? 'Solving (no timeout)…' : 'Solving…');
  await sleep(30);

  try {
    const r      = solveUnlimited
      ? pipeline.solve(imagePath, outputPath, 0)
      : pipeline.solve(imagePath, outputPath);
    const status = r.get('status').toString();

    if (status === 'solved') {
      const ra   = r.get('RA').toFixed(2);
      const dec  = r.get('Dec').toFixed(2);
      const fov  = r.get('FOV').toFixed(1);
      const rmse = r.get('RMSE').toFixed(0);
      const n    = r.get('matches');
      const t    = (r.get('T_solve') / 1000).toFixed(1);
      const cons = r.get('constellations').toString();
      r.destroy();

      showImage(pyodide.FS.readFile(outputPath));
      solvedOk       = true;
      solveUnlimited = false;
      btnSolve.textContent = 'Solve';
      updateAchievements({ constellations: cons ? cons.split(', ') : [], imageFile: currentImageFile });
      const plateDict = JSON.parse(pyodide.runPython('import json; json.dumps(pipeline.plate.to_dict())'));
      imageStore.set(currentImageFile, {
        bytes: currentImageBytes,
        ra: parseFloat(ra), dec: parseFloat(dec), fov: parseFloat(fov),
        plate: plateDict,
      });
      let msg = `RA=${ra}°  Dec=${dec}°  FOV=${fov}°  RMSE=${rmse}"  ${n} matches  ${t}s`;
      if (cons) msg += `\n${cons}`;
      setStatus(msg);
      setButtons({ camera:true, gallery:true, detect:true, solve:true, refine:true, save:true, settings:true, achievements:true});

    } else {
      r.destroy();
      solvedOk = false;
      if (status === 'too_few_stars') {
        solveUnlimited = false;
        btnSolve.textContent = 'Solve';
        setStatus('Too few stars for plate solving — try Detect ÷2.');
      } else if (solveUnlimited) {
        setStatus('No solution found even without time limit.');
      } else {
        solveUnlimited = true;
        btnSolve.textContent = 'Solve ∞';
        setStatus('No plate solution found — tap Solve ∞ to retry without timeout.');
      }
      setButtons({ camera: true, gallery: true, detect: true, solve: true, settings: true, achievements: true });
    }

  } catch (e) {
    setStatus('Solve error: ' + e.message);
    setButtons({ camera: true, gallery: true, detect: true, solve: true, settings: true, achievements: true });
    console.error(e);
  }
  busy = false;
});

// ── refine ────────────────────────────────────────────────────────────────────
btnRefine.addEventListener('click', async () => {
  if (busy || !pipeline) return;
  setBusy(true);
  setStatus('Refining solution…');
  await sleep(30);

  try {
    const r      = pipeline.refine(imagePath, outputPath);
    const status = r.get('status').toString();

    if (status === 'refined') {
      const ra   = r.get('RA').toFixed(2);
      const dec  = r.get('Dec').toFixed(2);
      const fov  = r.get('FOV').toFixed(1);
      const rmse = r.get('RMSE').toFixed(0);
      const n    = r.get('matches');
      const unkn = r.get('unknowns');
      const lim  = r.get('mag_limit').toFixed(1);
      const t    = (r.get('T_refine') / 1000).toFixed(1);
      const cons = r.get('constellations').toString();
      r.destroy();

      showImage(pyodide.FS.readFile(outputPath));
      updateAchievements({ constellations: cons ? cons.split(', ') : [], faintest: parseFloat(lim), imageFile: currentImageFile });
      const unkStr = unkn > 0 ? `  ${unkn} unidentified` : '';
      let msg = `RA=${ra}°  Dec=${dec}°  FOV=${fov}°  RMSE=${rmse}"  ${n} id  lim=${lim}m  ${t}s${unkStr}`;
      if (cons) msg += `\n${cons}`;
      setStatus(msg);
      setButtons({ camera:true, gallery:true, detect:true, solve:true, refine:true, save:true, settings:true, achievements:true});

    } else {
      r.destroy();
      setStatus('Refinement failed — try re-solving.');
      setButtons({ camera:true, gallery:true, detect:true, solve:solvedOk, refine:solvedOk, settings:true, achievements:true });
    }

  } catch (e) {
    setStatus('Refine error: ' + e.message);
    setButtons({ camera:true, gallery:true, detect:true, solve:solvedOk, refine:solvedOk, settings:true, achievements:true });
    console.error(e);
  }
  busy = false;
});

// ── panorama settings ─────────────────────────────────────────────────────────

const PANO_KEY      = 'starsolver_pano';
const PANO_DEFAULTS = { showGrid: true, constellations: 'off' };

function loadPanoSettings() {
  try { return { ...PANO_DEFAULTS, ...JSON.parse(localStorage.getItem(PANO_KEY) || '{}') }; }
  catch { return { ...PANO_DEFAULTS }; }
}
function savePanoSettings(s) { localStorage.setItem(PANO_KEY, JSON.stringify(s)); }

// ── panorama ──────────────────────────────────────────────────────────────────

const btnViewPano   = document.getElementById('btnViewPano');
const btnExportPano = document.getElementById('btnExportPano');
const PANO_PATH     = '/tmp/panorama.jpg';

function savePanoWithSettings() {
  const ps = loadPanoSettings();
  pyodide.globals.set('_pg', ps.showGrid);
  pyodide.globals.set('_pm', ps.constellations);
  if (ps.constellations === 'observed') {
    pyodide.globals.set('_po', pyodide.toPy(loadAch().constellations));
  } else {
    pyodide.globals.set('_po', null);
  }
  pyodide.runPython(
    `pano.save('${PANO_PATH}', show_grid=bool(_pg), cons_mode=str(_pm),` +
    ` observed_names=list(_po) if _po is not None else None)`
  );
}

let panoRenderer = null;
let panoCamera   = null;
let panoScene    = null;
let panoThree    = null;   // cached Three.js module
let panoGridObj  = null;   // THREE.LineSegments for coord grid
let panoConsObj  = null;   // THREE.LineSegments for constellation lines
let panoConsData = null;   // constellation segment data fetched from Python
let panoAz       = 0;
let panoEl       = 0;
let panoFov      = 75;

function renderPano() {
  const el = panoEl * Math.PI / 180;
  const az = panoAz * Math.PI / 180;
  panoCamera.lookAt(
    Math.cos(el) * Math.cos(az),
    Math.sin(el),
    Math.cos(el) * Math.sin(az)
  );
  panoRenderer.render(panoScene, panoCamera);
}

function resizePanoRenderer() {
  const w = window.innerWidth, h = window.innerHeight;
  panoRenderer.setSize(w, h);
  panoCamera.aspect = w / h;
  panoCamera.updateProjectionMatrix();
  renderPano();
}

function initPanoDrag(canvas) {
  let dragging = false, lx = 0, ly = 0;

  canvas.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; });
  window.addEventListener('mouseup',   () => { dragging = false; });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    panoAz -= (e.clientX - lx) * 0.3;
    panoEl  = Math.max(-85, Math.min(85, panoEl - (e.clientY - ly) * 0.3));
    lx = e.clientX; ly = e.clientY;
    renderPano();
  });

  let lt = null;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    lt = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const ct = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
    if (ct.length === 1 && lt && lt.length === 1) {
      panoAz -= (ct[0].x - lt[0].x) * 0.3;
      panoEl  = Math.max(-85, Math.min(85, panoEl - (ct[0].y - lt[0].y) * 0.3));
    } else if (ct.length === 2 && lt && lt.length === 2) {
      const d0 = Math.hypot(lt[0].x - lt[1].x, lt[0].y - lt[1].y);
      const d1 = Math.hypot(ct[0].x - ct[1].x, ct[0].y - ct[1].y);
      panoFov = Math.max(20, Math.min(120, panoFov * d0 / d1));
      panoCamera.fov = panoFov;
      panoCamera.updateProjectionMatrix();
    }
    lt = ct;
    renderPano();
  }, { passive: false });
}

function makeCoordGrid(THREE, radius) {
  const pts = [];
  const N   = 64;   // segments per latitude circle
  const M   = 32;   // segments per meridian

  // Dec parallels every 30° (skip poles)
  for (const dec of [-60, -30, 0, 30, 60]) {
    const d = dec * Math.PI / 180;
    for (let i = 0; i < N; i++) {
      const a0 = (i     / N) * 2 * Math.PI;
      const a1 = ((i+1) / N) * 2 * Math.PI;
      pts.push(
        -Math.cos(d)*Math.cos(a0), Math.sin(d), Math.cos(d)*Math.sin(a0),
        -Math.cos(d)*Math.cos(a1), Math.sin(d), Math.cos(d)*Math.sin(a1),
      );
    }
  }

  // RA meridians every 30°
  for (let ra = 0; ra < 360; ra += 30) {
    const r = ra * Math.PI / 180;
    for (let j = 0; j < M; j++) {
      const d0 = -Math.PI/2 + (j     / M) * Math.PI;
      const d1 = -Math.PI/2 + ((j+1) / M) * Math.PI;
      pts.push(
        -Math.cos(d0)*Math.cos(r), Math.sin(d0), Math.cos(d0)*Math.sin(r),
        -Math.cos(d1)*Math.cos(r), Math.sin(d1), Math.cos(d1)*Math.sin(r),
      );
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  return new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ color: 0x223344 }));
}

function makeConsLines(THREE, radius, consData, filterNames) {
  // filterNames: null = all constellations, Set = only those names
  const pts = [];
  for (const [name, segs] of Object.entries(consData)) {
    if (filterNames && !filterNames.has(name)) continue;
    for (const [ra1, dec1, ra2, dec2] of segs) {
      const r1 = ra1 * Math.PI / 180, d1 = dec1 * Math.PI / 180;
      const r2 = ra2 * Math.PI / 180, d2 = dec2 * Math.PI / 180;
      pts.push(
        -Math.cos(d1) * Math.cos(r1) * radius, Math.sin(d1) * radius, Math.cos(d1) * Math.sin(r1) * radius,
        -Math.cos(d2) * Math.cos(r2) * radius, Math.sin(d2) * radius, Math.cos(d2) * Math.sin(r2) * radius,
      );
    }
  }
  if (!pts.length) return null;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  return new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ color: 0xaa7700 }));
}

async function openPanoViewer(data) {
  document.getElementById('pano-viewer').style.display = 'block';

  if (!panoThree) {
    panoThree = await import('https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js');
  }
  const THREE = panoThree;

  if (!panoRenderer) {
    const canvas = document.getElementById('pano-canvas');
    panoRenderer = new THREE.WebGLRenderer({ canvas, antialias: false });
    panoRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    panoScene  = new THREE.Scene();
    panoCamera = new THREE.PerspectiveCamera(panoFov, 1, 0.1, 200);
    panoCamera.position.set(0, 0, 0);
    panoScene.add(new THREE.Mesh(          // index 0: image sphere
      new THREE.SphereGeometry(100, 64, 32),
      new THREE.MeshBasicMaterial({ side: THREE.BackSide })
    ));
    initPanoDrag(canvas);
    window.addEventListener('resize', resizePanoRenderer);
  }

  // Apply current panorama settings (runs on every open)
  const ps = loadPanoSettings();

  if (panoGridObj) { panoScene.remove(panoGridObj); panoGridObj = null; }
  if (ps.showGrid) {
    panoGridObj = makeCoordGrid(THREE, 99);
    panoScene.add(panoGridObj);
  }

  if (panoConsObj) { panoScene.remove(panoConsObj); panoConsObj = null; }
  if (ps.constellations !== 'off') {
    if (!panoConsData) {
      panoConsData = JSON.parse(pyodide.runPython(`
import json
from catalog import _LINES_RAW, _get_hip_coords, CONSTELLATIONS
_hc = _get_hip_coords()
_r = {}
for _row in _LINES_RAW:
    _abbr = _row[0]
    _name = CONSTELLATIONS.get(_abbr, _abbr)
    _segs = []
    for _i in range(0, len(_row) - 3, 2):
        _ha, _hb = _row[2 + _i], _row[3 + _i]
        if _ha in _hc and _hb in _hc:
            _segs.append([_hc[_ha][0], _hc[_ha][1], _hc[_hb][0], _hc[_hb][1]])
    if _segs:
        _r[_name] = _segs
json.dumps(_r)
`));
    }
    const filter = ps.constellations === 'observed'
      ? new Set(loadAch().constellations)
      : null;
    panoConsObj = makeConsLines(THREE, 98, panoConsData, filter);
    if (panoConsObj) panoScene.add(panoConsObj);
  }

  resizePanoRenderer();

  const url = URL.createObjectURL(new Blob([data], { type: 'image/jpeg' }));
  new THREE.TextureLoader().load(url, tex => {
    panoScene.children[0].material.map = tex;
    panoScene.children[0].material.needsUpdate = true;
    URL.revokeObjectURL(url);
    renderPano();
  });
}

document.getElementById('btnClosePano').addEventListener('click', () => {
  document.getElementById('pano-viewer').style.display = 'none';
});

// Per-image "Add to pano" — delegated from achImageList

  });
});

btnViewPano.addEventListener('click', async () => {
  if (busy || !pano) return;
  setBusy(true);
  setStatus('Building panorama image…');
  await sleep(30);
  try {
    // Save plain canvas — Three.js draws the grid/constellation overlay
    // itself, so we must not bake them into the texture here or they double.
    pyodide.runPython(`pano.save('${PANO_PATH}')`);
    const data = pyodide.FS.readFile(PANO_PATH);
    setStatus('');
    await openPanoViewer(data);
  } catch (e) {
    setStatus('Panorama error: ' + e.message);
    console.error(e);
  }
  busy = false;
  setButtons({
    camera: true, gallery: true,
    detect: !!currentImageFile,
    solve: solvedOk, refine: solvedOk, save: solvedOk,
    settings: true, achievements: true,
  });
  btnViewPano.disabled   = false;
  btnExportPano.disabled = false;
});

btnExportPano.addEventListener('click', async () => {
  if (busy || !pano) return;
  setBusy(true);
  setStatus('Exporting panorama…');
  await sleep(30);
  try {
    savePanoWithSettings();
    const data = pyodide.FS.readFile(PANO_PATH);
    const url  = URL.createObjectURL(new Blob([data], { type: 'image/jpeg' }));
    const a    = document.createElement('a');
    a.href = url; a.download = 'panorama.jpg'; a.click();
    URL.revokeObjectURL(url);
    setStatus('Panorama exported.');
  } catch (e) {
    setStatus('Export error: ' + e.message);
    console.error(e);
  }
  busy = false;
  setButtons({
    camera: true, gallery: true,
    detect: !!currentImageFile,
    solve: solvedOk, refine: solvedOk, save: solvedOk,
    settings: true, achievements: true,
  });
  btnViewPano.disabled   = false;
  btnExportPano.disabled = false;
});

initPyodide();
